<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 120" width="320" height="120">
  <defs>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#11111a;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="letterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00c87a;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="320" height="120" rx="14" ry="14" fill="url(#bgGrad)" stroke="#1e1e2e" stroke-width="1.5"/>

  <!-- Grid pattern lines (subtle) -->
  <g opacity="0.04" stroke="#00ff88" stroke-width="0.5">
    <line x1="0" y1="20" x2="320" y2="20"/><line x1="0" y1="40" x2="320" y2="40"/>
    <line x1="0" y1="60" x2="320" y2="60"/><line x1="0" y1="80" x2="320" y2="80"/>
    <line x1="0" y1="100" x2="320" y2="100"/>
    <line x1="32" y1="0" x2="32" y2="120"/><line x1="64" y1="0" x2="64" y2="120"/>
    <line x1="96" y1="0" x2="96" y2="120"/><line x1="128" y1="0" x2="128" y2="120"/>
    <line x1="160" y1="0" x2="160" y2="120"/><line x1="192" y1="0" x2="192" y2="120"/>
    <line x1="224" y1="0" x2="224" y2="120"/><line x1="256" y1="0" x2="256" y2="120"/>
    <line x1="288" y1="0" x2="288" y2="120"/>
  </g>

  <!-- Glow radial behind icon -->
  <ellipse cx="46" cy="60" rx="38" ry="38" fill="rgba(0,255,136,0.06)"/>

  <!-- Controller icon (left side) -->
  <g transform="translate(14, 34)" filter="url(#glow-green)">
    <!-- Controller body -->
    <rect x="4" y="10" width="56" height="34" rx="17" ry="17" fill="none" stroke="#00ff88" stroke-width="2.2"/>
    <!-- Left joystick circle -->
    <circle cx="18" cy="28" r="7" fill="none" stroke="#00ff88" stroke-width="1.8"/>
    <circle cx="18" cy="28" r="2.5" fill="#00ff88"/>
    <!-- Right buttons -->
    <circle cx="45" cy="22" r="3.5" fill="none" stroke="#00c3ff" stroke-width="1.5"/>
    <circle cx="52" cy="28" r="3.5" fill="none" stroke="#00c3ff" stroke-width="1.5"/>
    <circle cx="45" cy="34" r="3.5" fill="none" stroke="#00c3ff" stroke-width="1.5"/>
    <!-- D-pad -->
    <rect x="30" y="26" width="7" height="3.5" rx="1" fill="#00ff88" opacity="0.7"/>
    <rect x="32" y="24" width="3.5" height="7" rx="1" fill="#00ff88" opacity="0.7"/>
    <!-- Start/select lines -->
    <line x1="31" y1="19" x2="35" y2="19" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="37" y1="19" x2="41" y2="19" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Neon top accent line -->
  <line x1="14" y1="6" x2="306" y2="6" stroke="#00ff88" stroke-width="1" opacity="0.35"/>
  <line x1="14" y1="114" x2="306" y2="114" stroke="#00c3ff" stroke-width="1" opacity="0.2"/>

  <!-- "RG" main text -->
  <text x="90" y="72"
    font-family="'Orbitron', 'Arial Black', sans-serif"
    font-size="54"
    font-weight="900"
    fill="url(#letterGrad)"
    filter="url(#glow-green)"
    letter-spacing="4">RG</text>

  <!-- "GAMERS" subtext -->
  <text x="92" y="93"
    font-family="'Orbitron', 'Arial Black', sans-serif"
    font-size="15"
    font-weight="700"
    fill="#00c3ff"
    filter="url(#glow-blue)"
    letter-spacing="8">GAMERS</text>

  <!-- Decorative right corner bracket -->
  <g stroke="#00ff88" stroke-width="1.5" fill="none" opacity="0.5">
    <polyline points="292,15 306,15 306,30"/>
    <polyline points="292,105 306,105 306,90"/>
  </g>
  <g stroke="#00c3ff" stroke-width="1.5" fill="none" opacity="0.4">
    <polyline points="14,15 14,30"/>
  </g>

  <!-- Small "v2" version tag -->
  <text x="285" y="58" font-family="monospace" font-size="9" fill="#7878aa" letter-spacing="1">v2.0</text>

  <!-- Neon bottom badge -->
  <rect x="85" y="99" width="150" height="14" rx="7" fill="rgba(0,255,136,0.06)" stroke="rgba(0,255,136,0.2)" stroke-width="0.8"/>
  <text x="160" y="110" font-family="monospace" font-size="8" fill="#00ff88" text-anchor="middle" letter-spacing="2" opacity="0.7">FREE · FAST · FOREVER</text>
</svg>
