<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RG Gamers Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/style.css">
</head>

<body data-page="admin">

  <h1 style="text-align:center;">🎮 RG Gamers Admin Panel</h1>

  <div style="max-width:600px;margin:auto;padding:20px;">

    <form id="adminForm">

      <input id="gameTitle" type="text" placeholder="Game Title" required><br><br>

      <select id="gameCategory">
        <option>Action</option>
        <option>Adventure</option>
        <option>Racing</option>
        <option>Shooting</option>
        <option>Other</option>
      </select><br><br>

      <input id="gameSize" type="text" placeholder="File Size (e.g. 111 MB)" required><br><br>

      <input id="gameDownloadUrl" type="text" placeholder="Pixeldrain Link" required><br><br>

      <input id="gameImageUrl" type="text" placeholder="Image URL"><br><br>

      <textarea id="gameDesc" placeholder="Description"></textarea><br><br>

      <h3>System Requirements</h3>

      <input id="sysOS" placeholder="OS"><br><br>
      <input id="sysCPU" placeholder="CPU"><br><br>
      <input id="sysRAM" placeholder="RAM"><br><br>
      <input id="sysGPU" placeholder="GPU"><br><br>
      <input id="sysStorage" placeholder="Storage"><br><br>

      <label>
        <input id="gameTrending" type="checkbox"> Trending
      </label><br><br>

      <button type="submit">➕ Add Game</button>

    </form>

    <hr>

    <h2>📋 Added Games</h2>
    <div id="adminGamesList"></div>

  </div>

  <!-- JS -->
  <script src="../js/main.js"></script>

</body>
</html>
